<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coolify — Login</title>
  <meta name="description" content="Login to your personal web project dashboard" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-page">

  <!-- Particle canvas -->
  <canvas id="particles"></canvas>

  <div class="login-wrapper">
    <!-- Mascot -->
    <div class="mascot-wrap">
      <img src="mascot.png" alt="Coolify Mascot" class="mascot-img" />
    </div>

    <div class="login-card glass">
      <div class="login-logo">
        <span class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </span>
        <span class="logo-text gradient-text">Coolify</span>
      </div>
      <p class="login-sub">Your personal project hub</p>

      <form id="login-form" class="login-form" autocomplete="on">
        <div class="field-group">
          <label for="username">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Username
          </label>
          <input id="username" name="username" type="text" placeholder="Enter username" autocomplete="username" required />
        </div>

        <div class="field-group">
          <label for="password">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Password
          </label>
          <div class="input-wrap">
            <input id="password" name="password" type="password" placeholder="Enter password" autocomplete="current-password" required />
            <button type="button" id="toggle-pass" class="toggle-eye" aria-label="Toggle password visibility">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div id="login-error" class="login-error hidden">Invalid username or password.</div>

        <button type="submit" id="login-btn" class="btn btn-primary btn-full">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader hidden"></span>
        </button>
      </form>
    </div>
  </div>

  <script src="particles.js"></script>
  <script>
    initParticles('particles');

    const form      = document.getElementById('login-form');
    const errBox    = document.getElementById('login-error');
    const btn       = document.getElementById('login-btn');
    const btnText   = btn.querySelector('.btn-text');
    const btnLoader = btn.querySelector('.btn-loader');
    const toggleBtn = document.getElementById('toggle-pass');
    const passInput = document.getElementById('password');

    toggleBtn.addEventListener('click', () => {
      passInput.type = passInput.type === 'password' ? 'text' : 'password';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox.classList.add('hidden');
      btn.disabled = true;
      btnText.classList.add('hidden');
      btnLoader.classList.remove('hidden');

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });

        if (res.ok) {
          window.location.href = '/dashboard';
        } else {
          errBox.classList.remove('hidden');
        }
      } catch {
        errBox.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btnText.classList.remove('hidden');
        btnLoader.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
